<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSI 马丁策略 - 仪表板</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body { background: #0f172a; color: #e2e8f0; }
    .sidebar { background: #1e293b; border-right: 1px solid #334155; }
    .nav-item { transition: all 0.15s; }
    .nav-item:hover, .nav-item.active { background: rgba(99,102,241,0.15); color: #818cf8; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
    .badge-green { background: rgba(16,185,129,0.15); color: #34d399; }
    .badge-red { background: rgba(239,68,68,0.15); color: #f87171; }
    .badge-yellow { background: rgba(245,158,11,0.15); color: #fbbf24; }
    .badge-blue { background: rgba(99,102,241,0.15); color: #818cf8; }
    .rsi-bar { height: 6px; border-radius: 3px; background: #334155; }
    .rsi-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:50; display:flex; align-items:center; justify-content:center; }
    .modal-box { background:#1e293b; border:1px solid #334155; border-radius:12px; padding:24px; min-width:320px; max-width:420px; width:90%; }
  </style>
</head>
<body class="flex min-h-screen">

<!-- Sidebar -->
<aside class="sidebar w-56 flex-shrink-0 flex flex-col py-6 px-3 fixed h-full z-10">
  <div class="px-3 mb-8">
    <div class="text-lg font-bold text-white flex items-center gap-2">
      <span class="text-2xl">📈</span> RSI 马丁
    </div>
    <div class="text-xs text-slate-500 mt-0.5">量化交易平台</div>
  </div>
  <nav class="flex-1 space-y-1">
    <a href="/" class="nav-item active flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium">
      <span>🏠</span> 仪表板
    </a>
    <a href="/rsi-scanner.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-slate-400">
      <span>🔍</span> RSI 扫描
    </a>
    <a href="/trades.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-slate-400">
      <span>📋</span> 交易记录
    </a>
    <a href="/stats.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-slate-400">
      <span>📊</span> 盈利统计
    </a>
    <a href="/backtest.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-slate-400">
      <span>🧪</span> 历史回测
    </a>
    <a href="/settings.html" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-slate-400">
      <span>⚙️</span> 配置
    </a>
  </nav>
  <div class="px-3 pt-4 border-t border-slate-700">
    <div id="user-info" class="text-xs text-slate-500 mb-3"></div>
    <button onclick="logout()" class="text-xs text-slate-500 hover:text-red-400 transition-colors">退出登录</button>
  </div>
</aside>

<!-- Main -->
<main class="ml-56 flex-1 p-6 overflow-auto">
  <div class="max-w-7xl mx-auto">

    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-xl font-semibold text-white">仪表板</h1>
      <div class="flex items-center gap-3">
        <div id="bot-status-badge" class="px-3 py-1 rounded-full text-xs font-medium badge-red">机器人已停止</div>
        <button id="bot-toggle-btn" onclick="toggleBot()"
          class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm px-4 py-1.5 rounded-lg transition-all font-medium">
          启动机器人
        </button>
      </div>
    </div>

    <!-- Summary Cards -->
    <div class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-6">
      <div class="card p-4">
        <div class="text-xs text-slate-400 mb-1">账号余额 (USDT)</div>
        <div id="stat-balance" class="text-2xl font-bold text-cyan-400">--</div>
      </div>
      <div class="card p-4">
        <div class="text-xs text-slate-400 mb-1">总收益 (USDT)</div>
        <div id="stat-pnl" class="text-2xl font-bold text-green-400">--</div>
      </div>
      <div class="card p-4">
        <div class="text-xs text-slate-400 mb-1">持仓数量</div>
        <div id="stat-active" class="text-2xl font-bold text-indigo-400">--</div>
      </div>
      <div class="card p-4">
        <div class="text-xs text-slate-400 mb-1">总交易次数</div>
        <div id="stat-trades" class="text-2xl font-bold text-white">--</div>
      </div>
      <div class="card p-4">
        <div class="text-xs text-slate-400 mb-1">胜率</div>
        <div id="stat-winrate" class="text-2xl font-bold text-yellow-400">--</div>
      </div>
    </div>

    <!-- Main grid -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- Active Positions -->
      <div class="card p-5 lg:col-span-3">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-semibold text-white text-sm">当前持仓</h2>
          <button onclick="loadPositions()" class="text-xs text-indigo-400 hover:text-indigo-300">刷新</button>
        </div>
        <div id="positions-table" class="text-xs">
          <div class="text-slate-500 text-center py-8">暂无持仓</div>
        </div>
      </div>

      <!-- Bot Logs -->
      <div class="card p-5 lg:col-span-3">
        <div class="flex items-center justify-between mb-4">
          <h2 class="font-semibold text-white text-sm">运行日志</h2>
          <button onclick="loadLogs()" class="text-xs text-indigo-400 hover:text-indigo-300">刷新</button>
        </div>
        <div id="log-list" class="font-mono text-xs space-y-0.5 max-h-64 overflow-y-auto">
          <div class="text-slate-500 py-4 text-center">暂无日志</div>
        </div>
      </div>

    </div>
  </div>
</main>

<!-- 手动卖出 Modal -->
<div id="sell-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <h3 class="text-sm font-semibold text-white mb-1">手动卖出</h3>
    <p id="sell-modal-symbol" class="text-xs text-slate-400 mb-4"></p>
    <p class="text-xs text-slate-400 mb-3">选择卖出比例：</p>
    <div class="flex gap-3 mb-5">
      <button onclick="confirmSell(25)"
        class="flex-1 py-2 text-sm rounded-lg border border-orange-600/40 text-orange-400 hover:bg-orange-600/10 transition-all">
        25%
      </button>
      <button onclick="confirmSell(50)"
        class="flex-1 py-2 text-sm rounded-lg border border-orange-600/40 text-orange-400 hover:bg-orange-600/10 transition-all">
        50%
      </button>
      <button onclick="confirmSell(100)"
        class="flex-1 py-2 text-sm rounded-lg border border-red-600/50 text-red-400 hover:bg-red-600/10 transition-all font-medium">
        100% 清仓
      </button>
    </div>
    <button onclick="closeSellModal()" class="text-xs text-slate-400 hover:text-slate-300">取消</button>
  </div>
</div>

<!-- 手动补仓 Modal -->
<div id="buy-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <h3 class="text-sm font-semibold text-white mb-1">手动补仓</h3>
    <p id="buy-modal-symbol" class="text-xs text-slate-400 mb-4"></p>
    <label class="text-xs text-slate-400 block mb-1">补仓金额 (USDT)</label>
    <input id="buy-modal-amount" type="number" min="1" step="1" placeholder="例如 50"
      class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white mb-5 focus:outline-none focus:border-indigo-500" />
    <div class="flex gap-3">
      <button onclick="confirmBuy()"
        class="flex-1 py-2 text-sm rounded-lg bg-emerald-600 hover:bg-emerald-500 text-white font-medium transition-all">
        确认补仓
      </button>
      <button onclick="closeBuyModal()" class="flex-1 py-2 text-sm rounded-lg border border-slate-600 text-slate-400 hover:text-slate-300 transition-all">
        取消
      </button>
    </div>
  </div>
</div>

<script>
  const API = '';
  let token = localStorage.getItem('token');
  let botRunning = false;
  let ws = null;
  let wsRsi = null;      // public RSI WS for live prices
  let rsiMap = {};       // symbol → rsi (from WebSocket)
  let livePrice = {};    // symbol → latest price (from public RSI WS)
  let positionsData = []; // latest positions from API

  if (!token) window.location.href = '/login.html';

  async function api(path, opts = {}) {
    const res = await fetch(API + path, {
      headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...opts.headers },
      ...opts,
    });
    if (res.status === 401) { logout(); return null; }
    if (!res.ok) {
      let errMsg = `HTTP ${res.status}`;
      try {
        const d = await res.json();
        const raw = d.detail || d.message;
        if (typeof raw === 'string') errMsg = raw;
        else if (Array.isArray(raw)) errMsg = raw.map(e => e.msg || JSON.stringify(e)).join('; ');
        else if (raw) errMsg = JSON.stringify(raw);
      } catch {}
      toast(errMsg, true);
      return null;
    }
    return res.json();
  }

  function toast(msg, isError = false) {
    const el = document.createElement('div');
    el.textContent = msg;
    el.style.cssText = `position:fixed;bottom:24px;right:24px;z-index:9999;padding:10px 16px;border-radius:8px;font-size:13px;max-width:360px;
      background:${isError ? '#450a0a' : '#0f2a1e'};color:${isError ? '#fca5a5' : '#6ee7b7'};border:1px solid ${isError ? '#7f1d1d' : '#065f46'};`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }

  function logout() {
    localStorage.removeItem('token');
    window.location.href = '/login.html';
  }

  async function init() {
    const me = await api('/api/auth/me');
    if (me) document.getElementById('user-info').textContent = `👤 ${me.username}`;
    await refreshAll();
    connectWS();
    connectPriceWS();
    setInterval(refreshAll, 30000);
    setInterval(renderPositions, 1000);  // 1s visual refresh using livePrice
  }

  async function refreshAll() {
    await Promise.all([loadBotStatus(), loadBalance(), loadStats(), loadPositions(), loadLogs()]);
  }

  async function loadBalance() {
    const data = await api('/api/trading/balance');
    if (!data) return;
    const el = document.getElementById('stat-balance');
    if (data.balance_usdt != null) {
      el.textContent = data.balance_usdt.toFixed(2);
      el.className = 'text-2xl font-bold text-cyan-400';
    } else {
      el.textContent = data.error || '--';
      el.className = 'text-sm text-slate-500';
    }
  }

  async function loadBotStatus() {
    const data = await api('/api/trading/bot/status');
    if (!data) return;
    botRunning = data.running;
    const badge = document.getElementById('bot-status-badge');
    const btn = document.getElementById('bot-toggle-btn');
    if (botRunning) {
      badge.className = 'px-3 py-1 rounded-full text-xs font-medium badge-green';
      badge.textContent = '机器人运行中';
      btn.textContent = '停止机器人';
      btn.className = 'bg-red-600 hover:bg-red-500 text-white text-sm px-4 py-1.5 rounded-lg transition-all font-medium';
    } else {
      badge.className = 'px-3 py-1 rounded-full text-xs font-medium badge-red';
      badge.textContent = '机器人已停止';
      btn.textContent = '启动机器人';
      btn.className = 'bg-indigo-600 hover:bg-indigo-500 text-white text-sm px-4 py-1.5 rounded-lg transition-all font-medium';
    }
  }

  async function loadStats() {
    const d = await api('/api/stats/summary');
    if (!d) return;
    document.getElementById('stat-pnl').textContent = (d.total_pnl >= 0 ? '+' : '') + d.total_pnl.toFixed(4);
    document.getElementById('stat-pnl').className = `text-2xl font-bold ${d.total_pnl >= 0 ? 'text-green-400' : 'text-red-400'}`;
    document.getElementById('stat-active').textContent = d.active_positions;
    document.getElementById('stat-trades').textContent = d.total_trades;
    document.getElementById('stat-winrate').textContent = d.win_rate.toFixed(1) + '%';
  }

  async function loadPositions() {
    const positions = await api('/api/trading/positions');
    if (!positions) return;
    positionsData = positions;
    renderPositions();
  }

  function renderPositions() {
    const el = document.getElementById('positions-table');
    if (!positionsData.length) {
      el.innerHTML = '<div class="text-slate-500 text-center py-8">暂无持仓</div>';
      return;
    }
    el.innerHTML = `
      <table class="w-full">
        <thead><tr class="text-slate-500 border-b border-slate-700">
          <th class="text-left pb-2">交易对</th>
          <th class="text-right pb-2">持仓均价</th>
          <th class="text-right pb-2">当前价</th>
          <th class="text-right pb-2">涨跌幅</th>
          <th class="text-right pb-2">利润(U)</th>
          <th class="text-right pb-2">持仓金额(U)</th>
          <th class="text-right pb-2">马丁层</th>
          <th class="text-right pb-2">RSI</th>
          <th class="text-right pb-2">状态</th>
          <th class="text-right pb-2">操作</th>
        </tr></thead>
        <tbody class="divide-y divide-slate-800">
          ${positionsData.map(p => {
            // Prefer live price from WS scanner (updates every ~2s), fallback to API value
            const cp = livePrice[p.symbol] ?? p.current_price;
            const pnlPct = (cp != null && p.avg_price > 0)
              ? (cp - p.avg_price) / p.avg_price * 100 : null;
            const pnlColor = pnlPct == null ? 'text-slate-500' : pnlPct >= 0 ? 'text-green-400' : 'text-red-400';
            const pnlText = pnlPct == null ? '—' : (pnlPct >= 0 ? '+' : '') + pnlPct.toFixed(2) + '%';
            const profitUsdt = (cp != null && p.avg_price > 0)
              ? (cp - p.avg_price) * p.total_quantity : null;
            const profitColor = profitUsdt == null ? 'text-slate-500' : profitUsdt >= 0 ? 'text-green-400' : 'text-red-400';
            const profitText = profitUsdt == null ? '—' : (profitUsdt >= 0 ? '+' : '') + profitUsdt.toFixed(2);
            const curPrice = cp != null ? cp.toPrecision(6) : '—';
            const rsi = rsiMap[p.symbol];
            let rsiHtml;
            if (rsi == null || rsi <= 0) {
              rsiHtml = '<span class="text-slate-600">—</span>';
            } else {
              const rsiColor = rsi < 30 ? 'text-red-400' : rsi < 40 ? 'text-orange-400' : rsi > 70 ? 'text-green-400' : 'text-slate-300';
              rsiHtml = `<span class="${rsiColor} font-mono">${rsi.toFixed(1)}</span>`;
            }
            return `
            <tr class="hover:bg-slate-800/50">
              <td class="py-2 font-medium text-white">${p.symbol}</td>
              <td class="py-2 text-right text-slate-300">${p.avg_price.toFixed(6)}</td>
              <td class="py-2 text-right text-slate-400">${curPrice}</td>
              <td class="py-2 text-right font-medium ${pnlColor}">${pnlText}</td>
              <td class="py-2 text-right font-medium ${profitColor}">${profitText}</td>
              <td class="py-2 text-right text-slate-300">${p.total_invested.toFixed(2)}</td>
              <td class="py-2 text-right">
                <span class="badge-yellow px-2 py-0.5 rounded text-xs">L${p.martin_level}</span>
              </td>
              <td class="py-2 text-right">${rsiHtml}</td>
              <td class="py-2 text-right">
                ${p.trailing_active
                  ? '<span class="badge-green px-2 py-0.5 rounded text-xs">追踪止盈</span>'
                  : '<span class="badge-blue px-2 py-0.5 rounded text-xs">持仓中</span>'}
              </td>
              <td class="py-2 text-right whitespace-nowrap">
                <button onclick="openSellModal(${p.id}, '${p.symbol}')"
                  class="text-xs text-orange-400 hover:text-orange-300 mr-2">卖出</button>
                <button onclick="openBuyModal(${p.id}, '${p.symbol}')"
                  class="text-xs text-emerald-400 hover:text-emerald-300">补仓</button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`;
  }

  async function loadLogs() {
    const logs = await api('/api/trading/logs?limit=50');
    if (!logs) return;
    const el = document.getElementById('log-list');
    if (!logs.length) {
      el.innerHTML = '<div class="text-slate-500 py-4 text-center">暂无日志</div>';
      return;
    }
    el.innerHTML = logs.map(l => {
      const ts = new Date(l.timestamp + 'Z').toLocaleString('zh-CN');
      const color = l.level === 'ERROR' ? 'text-red-400' : l.level === 'WARNING' ? 'text-yellow-400' : 'text-slate-400';
      const sym = l.symbol ? `<span class="text-indigo-400">[${l.symbol}]</span> ` : '';
      return `<div class="${color} leading-5">${ts} ${sym}${l.message}</div>`;
    }).join('');
  }

  async function toggleBot() {
    const endpoint = botRunning ? '/api/trading/bot/stop' : '/api/trading/bot/start';
    const data = await api(endpoint, { method: 'POST' });
    if (data) {
      if (data.detail) alert(data.detail);
      else await loadBotStatus();
    }
  }

  // ── Manual sell modal ───────────────────────────────────────────────────────
  let _sellPositionId = null;
  let _sellSymbol = '';

  function openSellModal(posId, symbol) {
    _sellPositionId = posId;
    _sellSymbol = symbol;
    document.getElementById('sell-modal-symbol').textContent = symbol;
    document.getElementById('sell-modal').classList.remove('hidden');
  }

  function closeSellModal() {
    document.getElementById('sell-modal').classList.add('hidden');
    _sellPositionId = null;
  }

  async function confirmSell(pct) {
    if (pct === 100 && !confirm(`确认 100% 清仓 ${_sellSymbol}？`)) return;
    const positionId = _sellPositionId;
    closeSellModal();
    const res = await api(`/api/trading/positions/${positionId}/manual-sell`, {
      method: 'POST',
      body: JSON.stringify({ pct }),
    });
    if (!res) return;
    const pnl = res.pnl != null ? res.pnl.toFixed(4) : '—';
    toast(pct === 100
      ? `${res.symbol} 清仓成交 @ ${res.fill_price?.toFixed(6)} PnL: ${pnl} USDT`
      : `${res.symbol} ${pct}% 卖出成交 @ ${res.fill_price?.toFixed(6)} PnL: ${pnl} USDT`);
    await loadPositions();
    await loadStats();
    await loadLogs();
  }

  // ── Manual buy modal ────────────────────────────────────────────────────────
  let _buyPositionId = null;
  let _buySymbol = '';

  function openBuyModal(posId, symbol) {
    _buyPositionId = posId;
    _buySymbol = symbol;
    document.getElementById('buy-modal-symbol').textContent = symbol;
    document.getElementById('buy-modal-amount').value = '';
    document.getElementById('buy-modal').classList.remove('hidden');
    setTimeout(() => document.getElementById('buy-modal-amount').focus(), 50);
  }

  function closeBuyModal() {
    document.getElementById('buy-modal').classList.add('hidden');
    _buyPositionId = null;
  }

  async function confirmBuy() {
    const amount = parseFloat(document.getElementById('buy-modal-amount').value);
    if (!amount || amount <= 0) { toast('请输入有效的 USDT 金额', true); return; }
    const positionId = _buyPositionId;
    closeBuyModal();
    const res = await api(`/api/trading/positions/${positionId}/manual-buy`, {
      method: 'POST',
      body: JSON.stringify({ amount_usdt: amount }),
    });
    if (!res) return;
    toast(`${res.symbol} 补仓 ${amount} USDT @ ${res.fill_price?.toFixed(6)}，新均价 ${res.new_avg_price?.toFixed(6)}`);
    await loadPositions();
    await loadStats();
    await loadLogs();
  }

  function connectWS() {
    if (ws) ws.close();
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws?token=${token}`);

    ws.onmessage = (ev) => {
      const msg = JSON.parse(ev.data);
      if (msg.type === 'rsi_snapshot' && msg.data) {
        rsiMap = msg.data;
        renderPositions();
      } else if (msg.type === 'rsi_update' && msg.data) {
        rsiMap[msg.data.symbol] = msg.data.rsi;
        renderPositions();
      } else if (['position_opened','position_closed','martin_buy','position_partial_sell'].includes(msg.type)) {
        loadPositions();
        loadStats();
        loadLogs();
      }
    };

    ws.onclose = () => setTimeout(connectWS, 5000);
    ws.onerror = () => ws.close();

    // Send pings
    setInterval(() => { if (ws.readyState === 1) ws.send('ping'); }, 25000);
  }

  function connectPriceWS() {
    if (wsRsi) wsRsi.close();
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    wsRsi = new WebSocket(`${proto}://${location.host}/ws/rsi?token=${token}`);
    wsRsi.onmessage = (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        if (msg.type === 'public_rsi_snapshot') {
          for (const it of (msg.items || [])) {
            livePrice[it.symbol] = it.price;
            if (it.rsi) rsiMap[it.symbol] = it.rsi;
          }
        }
      } catch {}
    };
    wsRsi.onclose = () => setTimeout(connectPriceWS, 5000);
    wsRsi.onerror = () => wsRsi.close();
  }

  init();
</script>
</body>
</html>
